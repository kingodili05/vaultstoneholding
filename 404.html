<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Vaultstone Bank" />
  <meta name="theme-color" content="#0A0E1A" />
  <title>404 — Page Not Found · Vaultstone Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C9A84C'/><path d='M8 10h16v2H8zM8 15h16v2H8zM8 20h10v2H8z' fill='%230A0E1A'/></svg>" />

  <style>
    .not-found {
      min-height: 100vh;
      background: var(--primary-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .not-found::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 10% 90%, rgba(201,168,76,0.04) 0%, transparent 55%);
      pointer-events: none;
    }

    .nf-logo {
      display: flex; align-items: center; gap: 0.625rem;
      text-decoration: none;
      margin-bottom: 3rem;
      position: relative; z-index: 1;
    }
    .nf-logo__icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
    }
    .nf-logo__icon svg { width: 18px; height: 18px; color: var(--primary-deep); }
    .nf-logo__text { font-size: var(--text-xl); font-weight: var(--fw-extrabold); letter-spacing: -0.02em; color: var(--text); }
    .nf-logo__text span { color: var(--accent); }

    /* Vault icon */
    .nf-vault {
      position: relative;
      margin-bottom: 2rem;
      z-index: 1;
    }
    .nf-vault__ring {
      width: 120px; height: 120px;
      border: 2px solid var(--accent-border);
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      position: relative;
      animation: vault-pulse 3s ease infinite;
    }
    @keyframes vault-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.2); }
      50%       { box-shadow: 0 0 0 20px rgba(201,168,76,0); }
    }
    .nf-vault__icon {
      width: 80px; height: 80px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
    }
    .nf-vault__icon svg { width: 36px; height: 36px; color: var(--accent); }

    /* 404 number */
    .nf-code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: var(--fw-extrabold);
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 40%, var(--accent-border) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      position: relative; z-index: 1;
      user-select: none;
    }

    .nf-title {
      font-size: clamp(var(--text-xl), 4vw, var(--text-3xl));
      font-weight: var(--fw-bold);
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      position: relative; z-index: 1;
    }

    .nf-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 2.5rem;
      position: relative; z-index: 1;
    }

    .nf-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 3.5rem;
      position: relative; z-index: 1;
    }

    .nf-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 2rem;
      justify-content: center;
      position: relative; z-index: 1;
    }
    .nf-links a {
      font-size: var(--text-sm);
      color: var(--muted);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .nf-links a:hover { color: var(--accent); }

    .nf-divider {
      width: 1px;
      height: 16px;
      background: var(--muted-2);
      display: inline-block;
      vertical-align: middle;
    }

    /* Floating particles */
    .nf-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .nf-particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: float-particle linear infinite;
    }
    @keyframes float-particle {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }
  </style>
</head>
<body>

  <div class="cursor-dot"  aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <div class="not-found" role="main">

    <!-- 3D canvas background -->
    <canvas id="page-canvas" data-scene="vault404" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.65;"></canvas>

    <!-- CSS Particles (fallback / supplement) -->
    <div class="nf-particles" aria-hidden="true" id="particles"></div>

    <!-- Logo -->
    <a href="index.html" class="nf-logo" aria-label="Vaultstone Bank home">
      <div class="nf-logo__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1"/>
        </svg>
      </div>
      <span class="nf-logo__text">Vault<span>stone</span></span>
    </a>

    <!-- Vault icon -->
    <div class="nf-vault" aria-hidden="true">
      <div class="nf-vault__ring">
        <div class="nf-vault__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="nf-code" aria-hidden="true">404</div>

    <h1 class="nf-title">Vault Not Found</h1>
    <p class="nf-subtitle">
      This page doesn't exist or has been moved. Your funds are safe — we just can't find the page you're looking for.
    </p>

    <div class="nf-actions">
      <a href="index.html" class="btn btn-primary btn-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a href="dashboard.html" class="btn btn-outline btn-lg">Go to Dashboard</a>
    </div>

    <nav class="nf-links" aria-label="Helpful links">
      <a href="services.html">Services</a>
      <span class="nf-divider" aria-hidden="true"></span>
      <a href="about.html">About</a>
      <span class="nf-divider" aria-hidden="true"></span>
      <a href="faq.html">Help Center</a>
      <span class="nf-divider" aria-hidden="true"></span>
      <a href="contact.html">Contact</a>
      <span class="nf-divider" aria-hidden="true"></span>
      <a href="login.html">Log In</a>
    </nav>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
  <script src="scripts/main.js"></script>
  <script>
    // Spawn floating gold particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'nf-particle';
      p.style.cssText = [
        'left:' + (Math.random() * 100) + '%',
        'animation-duration:' + (8 + Math.random() * 12) + 's',
        'animation-delay:' + (Math.random() * 10) + 's',
        'width:' + (2 + Math.random() * 3) + 'px',
        'height:' + (2 + Math.random() * 3) + 'px',
        'opacity:' + (0.1 + Math.random() * 0.5),
      ].join(';');
      container.appendChild(p);
    }
  </script>
</body>
</html>

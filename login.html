<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to Vaultstone Bank — Secure, modern banking." />
  <meta name="theme-color" content="#0A0E1A" />
  <title>Sign In — Vaultstone Bank</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Auth Styles -->
  <link rel="stylesheet" href="styles/auth.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23C9A84C'/><path d='M8 10h16v2H8zM8 15h16v2H8zM8 20h10v2H8z' fill='%230A0E1A'/></svg>" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     SPLIT LAYOUT
═══════════════════════════════════════════════════════════ -->
<div class="auth-split">

  <!-- ───────────────────────────────────────
       LEFT — Three.js Vault Door Scene
  ─────────────────────────────────────────── -->
  <div class="auth-canvas-panel" aria-hidden="true">
    <canvas id="login-canvas"></canvas>
    <div class="canvas-overlay"></div>
    <div class="canvas-brand">
      <div class="canvas-brand__logo">
        <div class="canvas-brand__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
        </div>
        <span class="canvas-brand__name">Vault<span>stone</span></span>
      </div>
      <span class="canvas-brand__tagline">Banking Built on Trust</span>
    </div>
  </div>

  <!-- ───────────────────────────────────────
       RIGHT — Login Form
  ─────────────────────────────────────────── -->
  <div class="auth-form-panel">
    <div class="auth-card" role="main">

      <!-- Logo -->
      <div class="auth-logo" aria-label="Vaultstone Bank">
        <div class="auth-logo__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
        </div>
        <span class="auth-logo__text">Vault<span>stone</span></span>
      </div>

      <!-- Heading -->
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to access your account</p>
      </div>

      <!-- Form -->
      <form id="login-form" novalidate autocomplete="on">

        <!-- Email -->
        <div class="field-group">
          <input
            type="email"
            id="login-email"
            name="email"
            class="field-group__input"
            placeholder="Email address"
            autocomplete="email"
            required
          />
          <label for="login-email" class="field-group__label">Email address</label>
        </div>

        <!-- Password -->
        <div class="field-group field-group--password">
          <input
            type="password"
            id="login-password"
            name="password"
            class="field-group__input"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <label for="login-password" class="field-group__label">Password</label>
          <button type="button" class="field-group__toggle" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943
                       9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>

        <!-- Forgot Password -->
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

        <!-- Sign In Button -->
        <button type="submit" id="login-btn" class="btn btn--primary">
          <span class="btn__text">Sign In</span>
          <span class="btn__spinner" role="status" aria-label="Signing in..."></span>
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span class="auth-divider__line"></span>
        <span class="auth-divider__text">or continue with</span>
        <span class="auth-divider__line"></span>
      </div>

      <!-- OAuth -->
      <div class="oauth-grid">
        <button type="button" class="btn btn--oauth" aria-label="Continue with Google">
          <!-- Google logo -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <button type="button" class="btn btn--oauth" aria-label="Continue with Apple">
          <!-- Apple logo -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.4.07 2.37.74 3.18.8 1.21-.26 2.37-.97 3.67-.84 1.56.18 2.73.76 3.49 1.94-3.2 1.96-2.4 6.04.56 7.1-.57 1.57-1.3 3.13-2.9 4.88zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Apple
        </button>
      </div>

      <!-- Sign Up Link -->
      <p class="auth-footer-link">
        Don't have an account? <a href="signup.html">Open Account</a>
      </p>

      <!-- Security Badge -->
      <div class="security-badge" role="note" aria-label="Security information">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0
                   0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02
                   12.02 0 003 9c0 5.591 3.824 10.29 9 11.622
                   5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        256-bit SSL Encrypted &nbsp;·&nbsp; Bank-grade Security
      </div>

    </div><!-- /.auth-card -->
  </div><!-- /.auth-form-panel -->

</div><!-- /.auth-split -->

<!-- CDN Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- VaultStore (Supabase-backed) -->
<script src="scripts/supabase-client.js"></script>
<script src="scripts/supabase-store.js"></script>

<!-- Auth Script -->
<script src="scripts/auth.js"></script>
<script src="scripts/login-integration.js"></script>

<script src="scripts/tawk.js"></script>
</body>
</html>
